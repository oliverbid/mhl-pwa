<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MHL Services — Job Report</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#185FA5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MHL">
</head>
<body>

<header class="app-header">
  <div class="header-left">
    <h1>MHL Services</h1>
    <span class="subtitle">Owner Job Report</span>
  </div>
  <a href="admin.html" class="settings-btn" title="Admin settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </a>
</header>

<main class="main-content">

  <!-- Success Banner (hidden until submit) -->
  <div id="successBanner" class="success-banner hidden">
    <div class="check">✓</div>
    <h2>Report Submitted!</h2>
    <p>Your job report has been sent successfully.</p>
    <br>
    <button class="btn btn-outline" onclick="resetForm()">Submit Another Report</button>
  </div>

  <form id="reportForm" novalidate>

    <!-- ── Section A: Job Details ─────────────────────────── -->
    <div class="section-card">
      <div class="section-title">A — Job Details</div>
      <div class="section-body">

        <div class="field-group keep-2">
          <div class="field">
            <label for="loadMaster">Load Master</label>
            <select id="loadMaster" name="loadMaster" required>
              <option value="">Select…</option>
              <option value="Oliver Edwards">Oliver Edwards</option>
              <option value="Carlos Ramirez">Carlos Ramirez</option>
              <option value="Geronimo Vasquez">Geronimo Vasquez</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="field">
            <label for="invoiceNumber">Invoice Number</label>
            <input type="number" id="invoiceNumber" name="invoiceNumber" placeholder="e.g. 1042" required min="1">
          </div>
        </div>

        <!-- Load Master "Other" text -->
        <div class="field-group single" id="loadMasterOtherWrap" style="display:none; margin-top:-4px; margin-bottom:14px;">
          <div class="field">
            <label for="loadMasterOther">Load Master Name</label>
            <input type="text" id="loadMasterOther" name="loadMasterOther" placeholder="Enter name">
          </div>
        </div>

        <div class="field-group keep-2">
          <div class="field">
            <label for="vessel">Vessel</label>
            <select id="vessel" name="vessel" required>
              <option value="">Loading…</option>
            </select>
          </div>
          <div class="field">
            <label for="port">Port</label>
            <select id="port" name="port" required>
              <option value="">Loading…</option>
            </select>
          </div>
        </div>

        <!-- Vessel Other -->
        <div class="field-group single" id="vesselOtherWrap" style="display:none; margin-top:-4px; margin-bottom:14px;">
          <div class="field">
            <label for="vesselOther">Vessel Name</label>
            <input type="text" id="vesselOther" name="vesselOther" placeholder="Enter vessel name">
          </div>
        </div>

        <!-- Port Other -->
        <div class="field-group single" id="portOtherWrap" style="display:none; margin-top:-4px; margin-bottom:14px;">
          <div class="field">
            <label for="portOther">Port Name</label>
            <input type="text" id="portOther" name="portOther" placeholder="Enter port name">
          </div>
        </div>

        <div class="field-group keep-2">
          <div class="field">
            <label for="client">Client</label>
            <select id="client" name="client" required>
              <option value="">Select…</option>
              <option>Cross Chartering NV</option>
              <option>Ocean 7 Chartering</option>
              <option>FMT</option>
              <option>Ocean Transport</option>
              <option>MHL Rentals</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="operationType">Operation Type</label>
            <select id="operationType" name="operationType" required>
              <option value="">Select…</option>
              <option>Load</option>
              <option>Discharge</option>
              <option>Load and Discharge</option>
            </select>
          </div>
        </div>

        <div class="field-group keep-2">
          <div class="field">
            <label for="jobStart">Job Start Date</label>
            <input type="date" id="jobStart" name="jobStart" required>
          </div>
          <div class="field">
            <label for="jobEnd">Job End Date</label>
            <input type="date" id="jobEnd" name="jobEnd" required>
          </div>
        </div>

      </div>
    </div>

    <!-- ── Section B: Work Hours ──────────────────────────── -->
    <div class="section-card">
      <div class="section-title">B — Work Hours</div>
      <div class="section-body">
        <div class="table-wrap">
          <table id="hoursTable">
            <thead>
              <tr>
                <th class="col-date">Date</th>
                <th class="col-time">Start</th>
                <th class="col-time">Finish</th>
                <th class="col-num" title="Load Masters">LMs</th>
                <th class="col-num" title="Deckhands">DHs</th>
                <th class="col-num" title="Crane Operators">Crane</th>
                <th class="col-num" title="Divers">Divers</th>
                <th class="col-del"></th>
              </tr>
            </thead>
            <tbody id="hoursBody"></tbody>
          </table>
        </div>
        <button type="button" class="btn btn-add" onclick="addHoursRow()">+ Add day</button>
      </div>
    </div>

    <!-- ── Section C: Stand-by Days ──────────────────────── -->
    <div class="section-card">
      <div class="section-title">C — Stand-by Days</div>
      <div class="section-body">
        <div class="table-wrap">
          <table id="standbyTable">
            <thead>
              <tr>
                <th class="col-date">Date</th>
                <th class="col-num" style="min-width:120px">Number of People</th>
                <th class="col-del"></th>
              </tr>
            </thead>
            <tbody id="standbyBody"></tbody>
          </table>
        </div>
        <button type="button" class="btn btn-add" onclick="addStandbyRow()">+ Add stand-by day</button>
      </div>
    </div>

    <!-- ── Section D: Travel Days ─────────────────────────── -->
    <div class="section-card">
      <div class="section-title">D — Travel Days</div>
      <div class="section-body">
        <div class="table-wrap">
          <table id="travelTable">
            <thead>
              <tr>
                <th class="col-date">Date</th>
                <th class="col-num" style="min-width:120px">Number of People</th>
                <th class="col-del"></th>
              </tr>
            </thead>
            <tbody id="travelBody"></tbody>
          </table>
        </div>
        <button type="button" class="btn btn-add" onclick="addTravelRow()">+ Add travel day</button>
      </div>
    </div>

    <!-- ── Section E: Additional ──────────────────────────── -->
    <div class="section-card">
      <div class="section-title">E — Additional</div>
      <div class="section-body">

        <div class="field-group keep-2" style="margin-bottom:14px;">
          <div class="field">
            <label for="perDiemPeople">Per Diem People</label>
            <select id="perDiemPeople" name="perDiemPeople">
              <option value="0">0</option>
              <option>1</option><option>2</option><option>3</option>
              <option>4</option><option>5</option><option>6</option>
              <option>7</option><option>8</option>
            </select>
          </div>
          <div class="field">
            <label for="perDiemDays">Per Diem Days</label>
            <select id="perDiemDays" name="perDiemDays">
              <option value="0">0</option>
              <option>1</option><option>2</option><option>3</option><option>4</option>
              <option>5</option><option>6</option><option>7</option><option>8</option>
              <option>9</option><option>10</option><option>11</option><option>12</option>
              <option>13</option><option>14</option>
            </select>
          </div>
        </div>

        <div class="field-group single" style="margin-bottom:14px;">
          <div class="field">
            <label for="logisticsHours">Logistics Hours</label>
            <input type="number" id="logisticsHours" name="logisticsHours" value="0" min="0" step="0.5" placeholder="0">
          </div>
        </div>

        <div class="field-group single">
          <div class="field">
            <label for="cashExpenses">Cash Expenses</label>
            <textarea id="cashExpenses" name="cashExpenses"
              placeholder="Port paperwork $200 / Stevedore $500 / Customs $150"></textarea>
          </div>
        </div>

      </div>
    </div>

    <!-- ── Submit ──────────────────────────────────────────── -->
    <button type="submit" class="btn btn-primary btn-submit">Submit Report</button>

  </form>
</main>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
const WEBHOOK_URL = 'POWER_AUTOMATE_WEBHOOK_URL';

// ── Load config ────────────────────────────────────────────
async function loadConfig() {
  try {
    const res = await fetch('config.json?t=' + Date.now());
    return await res.json();
  } catch (e) {
    return { vessels: [], ports: [] };
  }
}

function populateSelect(selectEl, items, placeholder) {
  selectEl.innerHTML = `<option value="">${placeholder}</option>`;
  items.forEach(item => {
    const opt = document.createElement('option');
    opt.value = item;
    opt.textContent = item;
    selectEl.appendChild(opt);
  });
  const other = document.createElement('option');
  other.value = 'Other';
  other.textContent = 'Other';
  selectEl.appendChild(other);
}

// ── "Other" toggle helpers ─────────────────────────────────
function setupOtherToggle(selectId, wrapId) {
  const sel = document.getElementById(selectId);
  const wrap = document.getElementById(wrapId);
  sel.addEventListener('change', () => {
    wrap.style.display = sel.value === 'Other' ? '' : 'none';
  });
}

// ── Hours table ────────────────────────────────────────────
function numOpts(min, max, def = 0) {
  let html = '';
  for (let i = min; i <= max; i++) {
    html += `<option value="${i}"${i === def ? ' selected' : ''}>${i}</option>`;
  }
  return html;
}

function addHoursRow() {
  const tbody = document.getElementById('hoursBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-date"><input type="date" name="h_date[]"></td>
    <td class="col-time"><input type="time" name="h_start[]"></td>
    <td class="col-time"><input type="time" name="h_finish[]"></td>
    <td class="col-num"><select name="h_lm[]">${numOpts(0,4)}</select></td>
    <td class="col-num"><select name="h_dh[]">${numOpts(0,6)}</select></td>
    <td class="col-num"><select name="h_crane[]">${numOpts(0,4)}</select></td>
    <td class="col-num"><select name="h_diver[]">${numOpts(0,4)}</select></td>
    <td class="col-del"><button type="button" class="btn btn-danger" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
}

// ── Stand-by table ─────────────────────────────────────────
function addStandbyRow() {
  const tbody = document.getElementById('standbyBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-date"><input type="date" name="sb_date[]"></td>
    <td><select name="sb_people[]">${numOpts(1,6,1)}</select></td>
    <td class="col-del"><button type="button" class="btn btn-danger" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
}

// ── Travel table ───────────────────────────────────────────
function addTravelRow() {
  const tbody = document.getElementById('travelBody');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="col-date"><input type="date" name="tr_date[]"></td>
    <td><select name="tr_people[]">${numOpts(1,6,1)}</select></td>
    <td class="col-del"><button type="button" class="btn btn-danger" onclick="this.closest('tr').remove()">✕</button></td>
  `;
  tbody.appendChild(tr);
}

// ── Collect table data ─────────────────────────────────────
function collectHours() {
  return [...document.querySelectorAll('#hoursBody tr')].map(tr => ({
    date:   tr.querySelector('[name="h_date[]"]').value,
    start:  tr.querySelector('[name="h_start[]"]').value,
    finish: tr.querySelector('[name="h_finish[]"]').value,
    lm:     tr.querySelector('[name="h_lm[]"]').value,
    dh:     tr.querySelector('[name="h_dh[]"]').value,
    crane:  tr.querySelector('[name="h_crane[]"]').value,
    diver:  tr.querySelector('[name="h_diver[]"]').value,
  }));
}

function collectTable(bodyId, dateField, peopleField) {
  return [...document.querySelectorAll(`#${bodyId} tr`)].map(tr => ({
    date:   tr.querySelector(`[name="${dateField}"]`).value,
    people: tr.querySelector(`[name="${peopleField}"]`).value,
  }));
}

// ── Validation ─────────────────────────────────────────────
function validate() {
  let ok = true;
  const required = ['loadMaster','invoiceNumber','vessel','port','client','operationType','jobStart','jobEnd'];
  required.forEach(id => {
    const el = document.getElementById(id);
    el.classList.remove('field-error');
    if (!el.value) { el.classList.add('field-error'); ok = false; }
  });

  if (document.getElementById('loadMaster').value === 'Other') {
    const ot = document.getElementById('loadMasterOther');
    ot.classList.remove('field-error');
    if (!ot.value.trim()) { ot.classList.add('field-error'); ok = false; }
  }
  if (document.getElementById('vessel').value === 'Other') {
    const ot = document.getElementById('vesselOther');
    ot.classList.remove('field-error');
    if (!ot.value.trim()) { ot.classList.add('field-error'); ok = false; }
  }
  if (document.getElementById('port').value === 'Other') {
    const ot = document.getElementById('portOther');
    ot.classList.remove('field-error');
    if (!ot.value.trim()) { ot.classList.add('field-error'); ok = false; }
  }

  return ok;
}

// ── Toast ──────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Submit ─────────────────────────────────────────────────
document.getElementById('reportForm').addEventListener('submit', async e => {
  e.preventDefault();
  if (!validate()) { showToast('Please fill in all required fields'); return; }

  const lm = document.getElementById('loadMaster').value;
  const vessel = document.getElementById('vessel').value;
  const port = document.getElementById('port').value;

  const payload = {
    submittedBy: 'owner',
    submittedAt: new Date().toISOString(),
    loadMaster: lm === 'Other' ? document.getElementById('loadMasterOther').value : lm,
    invoiceNumber: document.getElementById('invoiceNumber').value,
    vessel: vessel === 'Other' ? document.getElementById('vesselOther').value : vessel,
    port: port === 'Other' ? document.getElementById('portOther').value : port,
    client: document.getElementById('client').value,
    operationType: document.getElementById('operationType').value,
    jobStart: document.getElementById('jobStart').value,
    jobEnd: document.getElementById('jobEnd').value,
    workHours: collectHours(),
    standbyDays: collectTable('standbyBody', 'sb_date[]', 'sb_people[]'),
    travelDays:  collectTable('travelBody',  'tr_date[]', 'tr_people[]'),
    perDiemPeople: document.getElementById('perDiemPeople').value,
    perDiemDays:   document.getElementById('perDiemDays').value,
    logisticsHours: document.getElementById('logisticsHours').value,
    cashExpenses:   document.getElementById('cashExpenses').value,
  };

  const btn = e.target.querySelector('[type="submit"]');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    if (WEBHOOK_URL !== 'POWER_AUTOMATE_WEBHOOK_URL') {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } else {
      // Dev mode: log to console
      console.log('PAYLOAD (dev mode):', JSON.stringify(payload, null, 2));
      await new Promise(r => setTimeout(r, 600));
    }
    document.getElementById('reportForm').classList.add('hidden');
    document.getElementById('successBanner').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    showToast('Submission failed — please check your connection');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Report';
  }
});

// ── Reset ──────────────────────────────────────────────────
function resetForm() {
  document.getElementById('reportForm').reset();
  document.getElementById('reportForm').classList.remove('hidden');
  document.getElementById('successBanner').classList.add('hidden');
  document.getElementById('hoursBody').innerHTML = '';
  document.getElementById('standbyBody').innerHTML = '';
  document.getElementById('travelBody').innerHTML = '';
  addHoursRow();
}

// ── Init ───────────────────────────────────────────────────
(async () => {
  const cfg = await loadConfig();
  populateSelect(document.getElementById('vessel'), cfg.vessels, 'Select vessel…');
  populateSelect(document.getElementById('port'),   cfg.ports,   'Select port…');
  setupOtherToggle('loadMaster', 'loadMasterOtherWrap');
  setupOtherToggle('vessel',     'vesselOtherWrap');
  setupOtherToggle('port',       'portOtherWrap');
  addHoursRow();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }
})();
</script>
</body>
</html>
