<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MHL Services - Create Invoice</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#185FA5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MHL">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <style>
    .job-card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; overflow: hidden; }
    .job-card-header { background: var(--blue-dark); color: white; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .job-card-header h3 { margin: 0; font-size: 1rem; font-weight: 600; }
    .inv-badge { background: rgba(255,255,255,0.18); border-radius: 20px; padding: 3px 12px; font-size: 0.8rem; font-weight: 500; }
    .job-card-body { padding: 16px 18px; }
    .job-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 14px; font-size: 0.85rem; color: var(--muted); }
    .job-meta span strong { color: var(--text); }
    .submissions-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px; }
    .submission-row { background: #f8fafc; border: 1px solid #e8eef4; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; font-size: 0.85rem; }
    .sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .sub-name { font-weight: 600; color: var(--blue-dark); }
    .sub-time { font-size: 0.75rem; color: var(--muted); }
    .hours-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; font-size: 0.78rem; }
    .hours-cell { background: white; border: 1px solid #dde5ed; border-radius: 6px; padding: 5px 8px; }
    .hc-label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .hc-value { font-weight: 600; color: var(--text); margin-top: 2px; }
    .conflict-warning { background: #fff8e1; border: 1px solid #ffe082; border-radius: 6px; padding: 8px 12px; font-size: 0.8rem; color: #7a5c00; margin-top: 10px; }
    .invoice-actions { border-top: 1px solid #e8eef4; padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .invoice-num-input { flex: 1; min-width: 140px; max-width: 200px; padding: 8px 12px; border: 1.5px solid #c8d6e2; border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: white; }
    .invoice-num-input:focus { outline: none; border-color: var(--blue-dark); }
    .btn-generate { background: #1a7a3e; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
    .btn-generate:hover { background: #156634; }
    .btn-generate:disabled { background: #aaa; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-generate.loading .spinner { display: block; }
    .btn-generate.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-link { background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; color: #1b5e20; display: flex; align-items: center; gap: 8px; }
    .success-link a { color: #1a7a3e; font-weight: 600; text-decoration: underline; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .loading-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .page-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .page-actions h2 { margin: 0; font-size: 1rem; color: var(--text); font-weight: 600; }
    .refresh-btn { background: none; border: 1.5px solid var(--blue-dark); color: var(--blue-dark); border-radius: 8px; padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
    .refresh-btn:hover { background: #f0f5fa; }
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-tab { padding: 6px 14px; border-radius: 20px; border: 1.5px solid #c8d6e2; background: white; font-size: 0.82rem; font-weight: 500; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .filter-tab.active { background: var(--blue-dark); border-color: var(--blue-dark); color: white; }
    .sub-count { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.25); border-radius: 12px; padding: 2px 8px; font-size: 0.75rem; margin-left: 6px; }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-left">
      <h1>MHL Services</h1>
      <span class="subtitle">Create Invoice</span>
    </div>
    <a href="admin.html" class="settings-btn" title="Admin">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </a>
  </header>
  <main class="main-content">
    <div class="auth-banner" id="authBanner">
      <span id="authInfo">Sign in with Microsoft to create invoices</span>
      <button type="button" id="signInBtn" class="btn btn-outline" style="min-height:38px;padding:6px 18px;font-size:0.85rem;" disabled>Initialising...</button>
    </div>
    <div id="mainContent" style="display:none;">
      <div class="page-actions">
        <h2 id="jobCount">Pending Jobs</h2>
        <button class="refresh-btn" onclick="loadSubmissions()">Refresh</button>
      </div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('pending',this)">Pending</button>
        <button class="filter-tab" onclick="setFilter('all',this)">All Jobs</button>
      </div>
      <div id="jobsList"><div class="loading-state">Loading submissions...</div></div>
    </div>
  </main>
  <div id="toast" class="toast"></div>
  <script>
    const CLIENT_ID    = '82cfd76a-a3ff-4861-b0a8-9a1f267efc9a';
    const TENANT_ID    = 'c45b6a98-5466-42bf-9671-d8e2073d7606';
    const REDIRECT_URI = 'https://oliverbid.github.io/mhl-pwa/invoice.html';
    const GRAPH_SCOPES = ['https://graph.microsoft.com/Files.ReadWrite'];
    const REPORTS_FILE = '/MHL%20Forms%20Data/MHL%20Job%20Reports.xlsx';
    const WORKING_FOLDER = '/MHL%20SERVICES/INVOICES%20WORKING%202026';
    const TEMPLATE_MAP = {
      'Cross Chartering NV': 'NEW CROSS BLANK INVOICE 2026.xlsx',
      'Ocean 7 Chartering':  'NEW OCEAN TRANSPORT INVOICE 2026.xlsx',
      'FMT':                 'NEW FMT BLANK INVOICE 2026.xlsx',
      'MHL Rentals':         'NEW MHL RENTALS INVOICE BLANK 2026.xlsx',
      'default':             'NEW OTHER BLANK INVOICE 2026.xlsx',
    };

    let msalInstance = null, currentAccount = null, allSubmissions = [], currentFilter = 'pending';
    const generatedInvoices = new Set();

    // Strip all non-printable and non-ASCII chars, keep only A-Z 0-9 space
    function cleanStr(s) {
      return (s || '').replace(/[^\x20-\x7E]/g, ' ').replace(/[^A-Za-z0-9 ]/g, ' ').replace(/\s+/g, ' ').trim().toUpperCase();
    }

    // Convert Excel serial date or ISO string to readable date
    function fmtDate(v) {
      if (!v) return '';
      const n = Number(v);
      if (!isNaN(n) && n > 40000) {
        return new Date(Math.round((n - 25569) * 86400 * 1000)).toLocaleDateString('en-GB');
      }
      try { return new Date(v).toLocaleDateString('en-GB'); } catch(e) { return String(v); }
    }

    function updateAuthUI() {
      const btn = document.getElementById('signInBtn');
      const info = document.getElementById('authInfo');
      btn.disabled = false;
      if (currentAccount) {
        info.textContent = 'Signed in as ' + (currentAccount.name || currentAccount.username);
        info.style.color = 'var(--blue-dark)';
        btn.textContent = 'Sign out';
        btn.onclick = signOut;
        document.getElementById('mainContent').style.display = 'block';
        loadSubmissions();
      } else {
        info.textContent = 'Sign in with Microsoft to create invoices';
        info.style.color = 'var(--muted)';
        btn.textContent = 'Sign in with Microsoft';
        btn.onclick = signIn;
        document.getElementById('mainContent').style.display = 'none';
      }
    }

    async function signIn() { await msalInstance.loginRedirect({ scopes: GRAPH_SCOPES }); }
    function signOut() { msalInstance.logoutRedirect({ account: currentAccount }); }

    async function getToken() {
      if (!currentAccount) throw new Error('Not signed in');
      try {
        const r = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: currentAccount });
        return r.accessToken;
      } catch(e) {
        if (e instanceof msal.InteractionRequiredAuthError) {
          await msalInstance.acquireTokenRedirect({ scopes: GRAPH_SCOPES, account: currentAccount });
        }
        throw e;
      }
    }

    async function loadSubmissions() {
      const list = document.getElementById('jobsList');
      list.innerHTML = '<div class="loading-state">Loading submissions...</div>';
      try {
        const token = await getToken();
        const res = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:' + REPORTS_FILE + ':/workbook/tables/JobReports/rows', {
          headers: { Authorization: 'Bearer ' + token }
        });
        if (!res.ok) throw new Error('Graph error ' + res.status);
        const data = await res.json();
        allSubmissions = (data.value || []).map((row, idx) => {
          const v = row.values[0];
          return {
            rowIndex: idx,
            timestamp:     v[0]  || '',
            formType:      v[1]  || '',
            loadMaster:    v[2]  || '',
            invoiceNumber: String(v[3] || '').trim(),
            vessel:        v[4]  || '',
            port:          v[5]  || '',
            client:        v[6]  || '',
            operationType: v[7]  || '',
            jobStart:      v[8]  || '',
            jobEnd:        v[9]  || '',
            workHours:     v[10] || '',
            standbyDays:   v[11] || '',
            travelDays:    v[12] || '',
            perDiemPeople: v[13] || 0,
            perDiemDays:   v[14] || 0,
            logisticsHours:v[15] || 0,
            cashExpenses:  v[16] || '',
          };
        }).filter(r => r.vessel || r.port);
        renderJobs();
      } catch(err) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">!</div><p>Could not load submissions.<br><small>' + err.message + '</small></p></div>';
      }
    }

    function groupSubmissions(subs) {
      const groups = {};
      subs.forEach(sub => {
        const key = cleanStr(sub.vessel) + '||' + cleanStr(sub.port);
        if (!groups[key]) {
          groups[key] = { vessel: sub.vessel, port: sub.port, client: sub.client, operationType: sub.operationType, jobStart: sub.jobStart, jobEnd: sub.jobEnd, invoiceNumber: '', submissions: [] };
        }
        const inv = sub.invoiceNumber;
        if (inv && inv !== '0' && inv !== '0000') groups[key].invoiceNumber = inv;
        if (sub.jobStart) groups[key].jobStart = sub.jobStart;
        if (sub.jobEnd)   groups[key].jobEnd   = sub.jobEnd;
        if (sub.client)   groups[key].client   = sub.client;
        if (sub.operationType) groups[key].operationType = sub.operationType;
        groups[key].submissions.push(sub);
      });
      return Object.values(groups);
    }

    function jobKey(g) { return cleanStr(g.vessel) + '||' + cleanStr(g.port); }

    function checkConflicts(subs) {
      if (subs.length < 2) return null;
      const totals = subs.map(sub => {
        const lines = (sub.workHours || '').split('\n').filter(Boolean);
        let lm = 0;
        lines.forEach(l => { const m = l.match(/LM:(\d+)/); if (m) lm += parseInt(m[1]); });
        return { name: sub.loadMaster, total: lm };
      });
      const vals = totals.map(t => t.total);
      if (!vals.every(v => v === vals[0])) {
        return { message: 'Hour discrepancy detected - using highest value (' + Math.max(...vals) + ' LM shifts)' };
      }
      return null;
    }

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderJobs();
    }

    function renderJobs() {
      const list = document.getElementById('jobsList');
      const groups = groupSubmissions(allSubmissions);
      const filtered = currentFilter === 'pending' ? groups.filter(g => !generatedInvoices.has(jobKey(g))) : groups;
      document.getElementById('jobCount').textContent = filtered.length + ' ' + (currentFilter === 'pending' ? 'Pending' : 'Total') + ' Job' + (filtered.length !== 1 ? 's' : '');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="empty-icon">OK</div><p>' + (currentFilter === 'pending' ? 'All jobs invoiced!' : 'No submissions yet.') + '</p></div>';
        return;
      }
      list.innerHTML = filtered.map(g => renderCard(g)).join('');
    }

    function renderCard(group) {
      const key = jobKey(group);
      const conflict = checkConflicts(group.submissions);
      const done = generatedInvoices.has(key);
      const invNum = group.invoiceNumber || '';
      const vesselDisplay = cleanStr(group.vessel);
      const portDisplay = cleanStr(group.port);

      const subRows = group.submissions.map(sub => {
        const lines = (sub.workHours || '').split('\n').filter(Boolean);
        const lm = lines.reduce((a,l) => { const m = l.match(/LM:(\d+)/); return a+(m?parseInt(m[1]):0); }, 0);
        const dh = lines.reduce((a,l) => { const m = l.match(/DH:(\d+)/); return a+(m?parseInt(m[1]):0); }, 0);
        const ts = fmtDate(sub.timestamp);
        return '<div class="submission-row"><div class="sub-header"><span class="sub-name">' + (sub.loadMaster||'Unknown') + '</span><span class="sub-time">' + ts + '</span></div>' +
          '<div class="hours-grid">' +
          '<div class="hours-cell"><div class="hc-label">Days</div><div class="hc-value">' + lines.length + '</div></div>' +
          '<div class="hours-cell"><div class="hc-label">LM Shifts</div><div class="hc-value">' + lm + '</div></div>' +
          '<div class="hours-cell"><div class="hc-label">DH Shifts</div><div class="hc-value">' + dh + '</div></div>' +
          '</div></div>';
      }).join('');

      const conflictHtml = conflict ? '<div class="conflict-warning">Warning: ' + conflict.message + '</div>' : '';
      const inputId = 'inv-' + key.replace(/[^A-Z0-9]/g,'_');
      const actionHtml = done
        ? '<div class="success-link">Invoice created this session</div>'
        : '<input class="invoice-num-input" type="number" placeholder="Invoice number" id="' + inputId + '" value="' + invNum + '" min="1">' +
          '<button class="btn-generate" onclick="generateInvoice(\'' + key + '\',this)">' +
          '<div class="spinner"></div><span class="btn-label">Generate Invoice</span></button>';

      return '<div class="job-card">' +
        '<div class="job-card-header"><h3>' + vesselDisplay + ' - ' + portDisplay + '</h3>' +
        '<span class="inv-badge">' + (invNum ? 'INV ' + invNum : 'No inv. number yet') + '<span class="sub-count">' + group.submissions.length + ' sub' + (group.submissions.length!==1?'s':'') + '</span></span></div>' +
        '<div class="job-card-body"><div class="job-meta">' +
        '<span><strong>Client:</strong> ' + (group.client||'') + '</span>' +
        '<span><strong>Type:</strong> ' + (group.operationType||'') + '</span>' +
        '<span><strong>Dates:</strong> ' + fmtDate(group.jobStart) + ' - ' + fmtDate(group.jobEnd) + '</span>' +
        '</div><div class="submissions-title">Submissions</div>' + subRows + conflictHtml + '</div>' +
        '<div class="invoice-actions">' + actionHtml + '</div></div>';
    }

    async function generateInvoice(key, btn) {
      const group = groupSubmissions(allSubmissions).find(g => jobKey(g) === key);
      if (!group) return;
      const inputId = 'inv-' + key.replace(/[^A-Z0-9]/g,'_');
      const invInput = document.getElementById(inputId);
      const invNum = invInput ? invInput.value.trim() : '';
      if (!invNum || invNum === '0') { showToast('Please enter an invoice number first'); if(invInput) invInput.focus(); return; }
      btn.classList.add('loading'); btn.disabled = true;
      try {
        const client = group.client || '';
        const templateName = TEMPLATE_MAP[client] || TEMPLATE_MAP['default'];
        const today = new Date().toISOString().slice(0,10);
        const vesselClean = cleanStr(group.vessel).split(' ').slice(0,3).join(' ');
        const portClean = cleanStr(group.port).split(' ')[0];
        const destName = 'MHL INV ' + invNum + ' ' + today + ' ' + vesselClean + ' - ' + portClean + '.xlsx';
        const token = await getToken();

        // Get template file
        const tPath = encodeURIComponent('/Documents/Claude Work/Accounts/' + templateName);
        const tRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:' + tPath, { headers: { Authorization: 'Bearer ' + token } });
        if (!tRes.ok) throw new Error('Template not found: ' + templateName);
        const tFile = await tRes.json();

        // Get or create working folder
        const wRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:' + WORKING_FOLDER, { headers: { Authorization: 'Bearer ' + token } }).catch(() => null);
        let wFolderId;
        if (wRes && wRes.ok) {
          wFolderId = (await wRes.json()).id;
        } else {
          const pRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/MHL%20SERVICES', { headers: { Authorization: 'Bearer ' + token } });
          const parent = await pRes.json();
          const cRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/items/' + parent.id + '/children', {
            method: 'POST',
            headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: 'INVOICES WORKING 2026', folder: {}, '@microsoft.graph.conflictBehavior': 'fail' })
          });
          wFolderId = (await cRes.json()).id;
        }

        // Copy template
        const copyRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/items/' + tFile.id + '/copy', {
          method: 'POST',
          headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ parentReference: { id: wFolderId }, name: destName })
        });
        if (copyRes.status === 202) {
          const monUrl = copyRes.headers.get('Location');
          await pollCopy(monUrl);
        } else if (!copyRes.ok) {
          const e = await copyRes.json().catch(() => ({}));
          throw new Error((e.error && e.error.message) || 'Copy failed');
        }

        generatedInvoices.add(key);

        // Get the new file ID for filling
        const nRes = await fetch('https://graph.microsoft.com/v1.0/me/drive/root:' + WORKING_FOLDER + '/' + encodeURIComponent(destName), { headers: { Authorization: 'Bearer ' + token } });
        const nFile = nRes.ok ? await nRes.json() : null;
        const fileUrl = (nFile && nFile.webUrl) || '#';
        const newFileId = nFile ? nFile.id : null;

        // Auto-fill the invoice
        btn.closest('.invoice-actions').innerHTML = '<div class="success-link">Filling invoice data...</div>';
        if (newFileId) {
          try {
            await fillInvoice(newFileId, token, group, invNum, destName);
          } catch(fillErr) {
            console.error('Fill error:', fillErr);
            showToast('Invoice created but fill failed: ' + fillErr.message);
          }
        }

        btn.closest('.invoice-actions').innerHTML = '<div class="success-link">Invoice ready: <a href="' + fileUrl + '" target="_blank">' + destName + '</a></div>';
        showToast('Invoice ' + invNum + ' created and filled!');

      } catch(err) {
        showToast('Error: ' + err.message);
        btn.classList.remove('loading'); btn.disabled = false;
      }
    }

    // ── Parse work hours from stored format ──────────────────────────────
    // Format: "2026-04-10 09:00-21:00 | LM:1 DH:1 Crane:0 Diver:0"
    // -- Parse work hours from stored format --
    // Format: "2026-04-10 09:00-21:00 | LM:1 DH:1 Crane:0 Diver:0"
    function parseWorkHours(raw) {
      return (raw || '').split('\n').filter(Boolean).map(line => {
        const dateM  = line.match(/^(\d{4}-\d{2}-\d{2})/);
        const timeM  = line.match(/(\d{2}:\d{2})[^\d](\d{2}:\d{2})/);
        const lmM    = line.match(/LM:(\d+)/);
        const dhM    = line.match(/DH:(\d+)/);
        const crM    = line.match(/Crane:(\d+)/);
        const divM   = line.match(/Diver:(\d+)/);
        if (!dateM) return null;
        const date   = dateM[1];
        const start  = timeM ? timeM[1] : '00:00';
        const finish = timeM ? timeM[2] : '00:00';
        const lm     = parseInt(lmM ? lmM[1] : 0);
        const dh     = parseInt(dhM ? dhM[1] : 0);
        const crane  = parseInt(crM ? crM[1] : 0);
        const diver  = parseInt(divM ? divM[1] : 0);
        const [sh, sm] = start.split(':').map(Number);
        const [fh, fm] = finish.split(':').map(Number);
        const hrs = Math.round(((fh * 60 + fm) - (sh * 60 + sm)) / 60 * 2) / 2;
        const [y, mo, d] = date.split('-');
        return { date: d + '-' + mo + '-' + y, start, finish, hrs, lm, dh, crane, diver };
      }).filter(Boolean);
    }

    function parseDays(raw) {
      return (raw || '').split('\n').filter(Boolean).map(line => {
        const m = line.match(/^(.*?):\s*(\d+)\s*people?/i);
        if (!m) return null;
        const dateRaw = m[1].trim();
        const people  = parseInt(m[2]);
        const dm = dateRaw.match(/(\d{4})-(\d{2})-(\d{2})/);
        return { date: dm ? dm[3] + '-' + dm[2] + '-' + dm[1] : dateRaw, people };
      }).filter(Boolean);
    }

    async function fillInvoice(fileId, token, group, invNum, destName) {
      const base = 'https://graph.microsoft.com/v1.0/me/drive/items/' + fileId;

      // Create persistent workbook session (required for insert/delete rows)
      const sessionRes = await fetch(base + '/workbook/createSession', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ persistChanges: true })
      });
      if (!sessionRes.ok) {
        const e = await sessionRes.json().catch(() => ({}));
        throw new Error('Session error: ' + ((e.error && e.error.message) || sessionRes.status));
      }
      const sessionId = (await sessionRes.json()).id;
      const hdrs = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', 'workbook-session-id': sessionId };
      const ws = base + '/workbook/worksheets(%27Invoice%27)';

      async function rng(addr) {
        const r = await fetch(ws + '/range(address=%27' + encodeURIComponent(addr) + '%27)', { headers: hdrs });
        if (!r.ok) { console.error('READ ' + addr + ' = ' + r.status); return []; }
        return (await r.json()).values || [];
      }

      async function wrt(addr, vals) {
        const r = await fetch(ws + '/range(address=%27' + encodeURIComponent(addr) + '%27)', {
          method: 'PATCH', headers: hdrs, body: JSON.stringify({ values: vals })
        });
        if (!r.ok) console.error('WRITE ' + addr + ' = ' + r.status);
      }

      async function insRows(rowIdx, count) {
        const addr = 'A' + rowIdx + ':H' + (rowIdx + count - 1);
        const r = await fetch(ws + '/range(address=%27' + encodeURIComponent(addr) + '%27)/insert', {
          method: 'POST', headers: hdrs, body: JSON.stringify({ shift: 'Down' })
        });
        if (!r.ok) console.error('INSERT at ' + rowIdx + ' = ' + r.status);
      }

      async function delRow(rowIdx) {
        const addr = 'A' + rowIdx + ':H' + rowIdx;
        const r = await fetch(ws + '/range(address=%27' + encodeURIComponent(addr) + '%27)/delete', {
          method: 'POST', headers: hdrs, body: JSON.stringify({ shift: 'Up' })
        });
        if (!r.ok) console.error('DELETE ' + rowIdx + ' = ' + r.status);
      }

      async function findLabel(label) {
        const vals = await rng('B28:B80');
        for (let i = 0; i < vals.length; i++) {
          if (vals[i][0] && vals[i][0].toString().toLowerCase().includes(label.toLowerCase())) return 28 + i;
        }
        return null;
      }

      // -- Write header fields --
      const t = new Date();
      const dd = String(t.getDate()).padStart(2,'0'), mm = String(t.getMonth()+1).padStart(2,'0'), yyyy = t.getFullYear();
      await wrt('E2', [[dd + '/' + mm + '/' + yyyy]]);
      await wrt('E3', [[destName]]);

      const op = (group.operationType || '').toLowerCase();
      const opWord = op.includes('load') && op.includes('discharge') ? 'Loading and discharging'
                   : op.includes('discharge') ? 'Discharging' : op.includes('load') ? 'Loading' : 'Loading and discharging';
      const portName = group.port.replace(/^[A-Z]{2,4}\s*-\s*/i,'').trim();
      await wrt('B21', [[opWord + ' yachts on board the ' + cleanStr(group.vessel) + ' in ' + portName]]);

      // -- Parse data --
      // Merge all submissions into one combined dataset
      const md = group.submissions.reduce((acc, sub) => {
        if (!acc.workHours) return {...sub};
        // Combine workHours - take all lines, deduplicate by date keeping max values
        const hours = {};
        [...acc.workHours.split('\n'), ...sub.workHours.split('\n')].filter(Boolean).forEach(line => {
          const dm = line.match(/^(\d{4}-\d{2}-\d{2})/);
          if (!dm) return;
          const d = dm[1];
          const lm = parseInt((line.match(/LM:(\d+)/)||[0,0])[1]);
          const dh = parseInt((line.match(/DH:(\d+)/)||[0,0])[1]);
          const cr = parseInt((line.match(/Crane:(\d+)/)||[0,0])[1]);
          const di = parseInt((line.match(/Diver:(\d+)/)||[0,0])[1]);
          if (!hours[d]) hours[d] = line;
          else {
            const pl = hours[d];
            const plm = parseInt((pl.match(/LM:(\d+)/)||[0,0])[1]);
            if (lm > plm) hours[d] = line;
          }
        });
        return {
          ...acc,
          workHours: Object.values(hours).join('\n'),
          standbyDays: acc.standbyDays || sub.standbyDays,
          travelDays: acc.travelDays || sub.travelDays,
          logisticsHours: Math.max(parseFloat(acc.logisticsHours)||0, parseFloat(sub.logisticsHours)||0),
        };
      }, {});
      const wdays = parseWorkHours(md.workHours);
      const sbDays = parseDays(md.standbyDays);
      const trDays = parseDays(md.travelDays);
      const logHrs = parseFloat(md.logisticsHours) || 0;
      const lmRows = wdays.filter(d => d.lm > 0);
      const dhRows = wdays.filter(d => d.dh > 0);
      const crRows = wdays.filter(d => d.crane > 0);
      const divRows = wdays.filter(d => d.diver > 0);

      // Helper to fill a section
      async function fillSection(label, rows, rate, roleKey, roleLabel) {
        const hdr = await findLabel(label);
        if (!hdr) return;
        const ph = hdr + 1;
        await delRow(ph);
        if (rows.length > 0) {
          if (rows.length > 1) await insRows(ph, rows.length);
          for (let i = 0; i < rows.length; i++) {
            const r = rows[i];
            const qty = r.hrs * r[roleKey];
            const desc = 'Date: ' + r.date + ' ' + r.start + ' to ' + r.finish + ' ' + r.hrs + 'h for ' + r[roleKey] + roleLabel;
            await wrt('B' + (ph+i) + ':H' + (ph+i), [[null, desc, null, null, null, qty, rate, null]]);
          }
        }
      }

      await fillSection('loadmaster', lmRows, 100, 'lm', 'LM');
      await fillSection('deckhand', dhRows, 80, 'dh', 'DH');
      await fillSection('crane', crRows, 75, 'crane', ' crane');
      await fillSection('diving', divRows, 150, 'diver', ' diver');

      // -- Stand by --
      const sbHdr = await findLabel('stand by');
      if (sbHdr && sbDays.length > 0) {
        const total = sbDays.reduce((a,d) => a + d.people, 0);
        const dates = sbDays.map(d => d.date + ' (' + d.people + 'p)').join(', ');
        await wrt('B' + (sbHdr+1) + ':H' + (sbHdr+1), [[null, 'Date: ' + dates, null, null, null, total, 200, null]]);
      }

      // -- Travel --
      const trHdr = await findLabel('travel days');
      if (trHdr && trDays.length > 0) {
        const total = trDays.reduce((a,d) => a + d.people, 0);
        const dates = trDays.map(d => d.date + ' (' + d.people + 'p)').join(', ');
        await wrt('B' + (trHdr+1) + ':H' + (trHdr+1), [[null, 'Date: ' + dates, null, null, null, total, 200, null]]);
      }

      // -- Logistics --
      const logHdr = await findLabel('logistics');
      if (logHdr) await wrt('F' + logHdr, [[logHrs]]);

      // Close session
      await fetch(base + '/workbook/closeSession', {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', 'workbook-session-id': sessionId }
      });
    }

    async function pollCopy(url, attempts) {
      attempts = attempts || 0;
      if (attempts > 30) throw new Error('Copy timed out');
      await new Promise(r => setTimeout(r, 1500));
      const res = await fetch(url);
      if (!res.ok) return;
      const d = await res.json();
      if (d.status === 'completed') return;
      if (d.status === 'failed') throw new Error('File copy failed');
      return pollCopy(url, attempts + 1);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 4000);
    }

    (async () => {
      msalInstance = new msal.PublicClientApplication({
        auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/' + TENANT_ID, redirectUri: REDIRECT_URI },
        cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: true },
      });
      if (typeof msalInstance.initialize === 'function') await msalInstance.initialize();
      try {
        const resp = await msalInstance.handleRedirectPromise();
        if (resp) { currentAccount = resp.account; }
        else { const accs = msalInstance.getAllAccounts(); if (accs.length > 0) currentAccount = accs[0]; }
      } catch(err) { console.error('MSAL error:', err); }
      updateAuthUI();
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
    })();
  </script>
